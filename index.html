  @media (max-width: 768px) {

  @keyframes rippleSweep {

  .ripple-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 0; background: linear-gradient(90deg, transparent, rgba(74,125,255,0.30), rgba(255,122,174,0.24), transparent); transform: translateX(-100%); width: 60%; }
  .ripple-play .ripple-overlay { animation: rippleSweep 1.5s ease-out forwards; }
  @keyframes pulseRingBlue { 0% { box-shadow: 0 0 0 0 rgba(74,125,255,0.55); } 70% { box-shadow: 0 0 0 20px rgba(74,125,255,0); } 100% { box-shadow: 0 0 0 0 rgba(74,125,255,0); } }
  @keyframes pulseRingPink { 0% { box-shadow: 0 0 0 0 rgba(255,122,174,0.55); } 70% { box-shadow: 0 0 0 20px rgba(255,122,174,0); } 100% { box-shadow: 0 0 0 0 rgba(255,122,174,0); } }
  @keyframes pulseRingWhite { 0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.45); } 70% { box-shadow: 0 0 0 20px rgba(255,255,255,0); } 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); } }
  .btn-pulse-blue { animation: pulseRingBlue 2.5s ease-out infinite; }

<script>
  // 1. 수파베이스 설정 정보
  const SUPABASE_URL = 'https://jtoujsntxxqxsynsanxz.supabase.co'; 
  const SUPABASE_ANON_KEY = 'sb_publishable_BQmz1lOWrsYqkePwEZhiBg_mM8CARh6';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentRole = 'client';

  // 2. 모달 제어 엘리먼트
  const requestModal = document.getElementById('requestModal');
  const modalTitle = document.getElementById('modalTitle');
  const categoryGroup = document.getElementById('categoryGroup');
  const modalForm = document.getElementById('modalForm');

  function openClientModal() {
    currentRole = 'client';
    modalTitle.innerText = '📋 맞춤 견적 요청하기';
    categoryGroup.style.display = 'block';
    requestModal.classList.remove('hidden');
  }

  function openPartnerModal() {
    currentRole = 'partner';
    modalTitle.innerText = '🛠️ 기사님 파트너 등록 신청';
    categoryGroup.style.display = 'none';
    requestModal.classList.remove('hidden');
  }

  function closeModal() {
    requestModal.classList.add('hidden');
    modalForm.reset();
  }

  document.getElementById('btnCloseModal').addEventListener('click', closeModal);
  requestModal.addEventListener('click', (e) => { if(e.target === requestModal) closeModal(); });

  // =======================================================================
  // 🔥 [새로 추가된 핵심 기능] 수파베이스에서 실시간 요청 목록 가져오기 함수
  // =======================================================================
  async function fetchLiveRequests() {
    // 수파베이스 'users' 테이블에서 최신순(created_at 내림차순)으로 일반 고객('client') 요청 3개만 긁어옵니다.
    const { data, error } = await supabaseClient
      .from('users')
      .select('*')
      .eq('role', 'client')
      .order('created_at', { ascending: false })
      .limit(3);

    if (error) {
      console.error('목록 로드 실패:', error.message);
      return;
    }

    // 목록을 그려줄 화면 구역(현황판 구역을 HTML에 자동 생성하거나 타겟 지정)
    const targetSection = document.querySelector('section.reveal'); // 첫 번째 섹션 타겟
    
    // 이미 현황판 리스트가 있다면 지우고 새로 그리기 위해 체크
    let liveBoard = document.getElementById('liveRequestBoard');
    if (!liveBoard) {
      // 현황판을 담을 이쁜 박스 구조를 HTML에 동적으로 만들어 넣습니다.
      liveBoard = document.createElement('div');
      liveBoard.id = 'liveRequestBoard';
      liveBoard.className = 'max-w-[1440px] mx-auto px-6 md:px-8 lg:px-10 mt-12';
      liveBoard.innerHTML = `
        <div class="bg-bg/50 border-2 border-dashed border-cobalt/30 rounded-2xl p-6 md:p-8">
          <div class="flex items-center gap-2 mb-6">
            <span class="w-3 h-3 rounded-full bg-pinkAccent animate-pulse"></span>
            <h3 class="text-lg font-black text-ink">⚡ 현재 실시간 접수 중인 요청 현황</h3>
          </div>
          <div id="liveRequestList" class="grid grid-cols-1 md:grid-cols-3 gap-5">
            </div>
        </div>
      `;
      // '자주 요청되는 일' 섹션 내부 맨 아래에 덧붙임
      targetSection.appendChild(liveBoard);
    }

    const listContainer = document.getElementById('liveRequestList');
    listContainer.innerHTML = ''; // 초기화

    // 만약 들어온 데이터가 없다면 가이드 문구 출력
    if (!data || data.length === 0) {
      listContainer.innerHTML = `<p class="text-sm text-ink/40 col-span-3 text-center py-4">현재 접수된 실시간 견적 요청이 없습니다.</p>`;
      return;
    }

    // 긁어온 데이터를 바탕으로 예쁜 카드 UI 동적 생성
    data.forEach(item => {
      // 날짜 포맷 간단히 변경
      const requestDate = new Date(item.created_at).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
      
      const card = document.createElement('div');
      card.className = 'bg-white rounded-xl p-5 shadow-card hover:shadow-cardHover transition-all border border-cobalt/10 flex flex-col justify-between';
      card.innerHTML = `
        <div>
          <div class="flex items-center justify-between mb-3">
            <span class="px-2.5 py-1 rounded-full bg-cobalt/10 text-cobalt text-[12px] font-bold">${item.category || '기타'}</span>
            <span class="text-[12px] text-ink/40 font-medium tabular">${requestDate} 접수</span>
          </div>
          <h4 class="font-extrabold text-ink text-[15px] mb-1">${item.name ? item.name[0] + ' * ' + (item.name[2] || '') : '익명'} 고객님</h4>
          <p class="text-[13px] text-ink/70 line-clamp-2 mt-2 bg-bg/40 p-2.5 rounded-lg border border-dashed border-[#DCE9FF]">${item.details || '상세 내용이 없습니다.'}</p>
        </div>
        <div class="mt-4 pt-3 border-t border-ink/5 flex items-center justify-between">
          <span class="text-[12px] text-pinkAccent font-bold">견적 매칭 중 ⏱️</span>
          <span class="text-[11px] text-ink/40 tabular">${item.phone ? item.phone.substring(0,3) + '-****-' + item.phone.substring(item.phone.length-4) : '010-****-****'}</span>
        </div>
      `;
      listContainer.appendChild(card);
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    // 페이지가 켜지자마자 수파베이스에서 데이터를 읽어와 화면에 뿌려줍니다.
    fetchLiveRequests();

    document.querySelectorAll('.btn-open-modal').forEach(btn => {
      btn.addEventListener('click', (e) => { e.preventDefault(); openClientModal(); });
    });
    document.querySelectorAll('a[href="#"]').forEach(btn => {
      if (btn.innerText.includes('견적 받기')) {
        btn.addEventListener('click', (e) => { e.preventDefault(); openClientModal(); });
      }
      if (btn.innerText.includes('파트너')) {
        btn.addEventListener('click', (e) => { e.preventDefault(); openPartnerModal(); });
      }
    });
    document.querySelectorAll('.btn-open-partner').forEach(btn => {
      btn.addEventListener('click', (e) => { e.preventDefault(); openPartnerModal(); });
    });

    // 폼 전송 처리
    modalForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const nameVal = document.getElementById('modalName').value;
      const phoneVal = document.getElementById('modalPhone').value;
      const detailsVal = document.getElementById('modalDetails').value;
      const categoryVal = currentRole === 'client' ? document.getElementById('userCategory').value : '전문가 파트너';

      const { data, error } = await supabaseClient
        .from('users')
        .insert([
          { name: nameVal, phone: phoneVal, role: currentRole, category: categoryVal, details: detailsVal }
        ]);

      if (error) {
        alert('등록 중 에러가 발생했습니다: ' + error.message);
      } else {
        alert('🎉 신청이 완벽하게 접수되었습니다!\n감사합니다.');
        closeModal();
        // 제출 후 목록 새로고침
        fetchLiveRequests();
      }
    });
  });

  // 모바일 메뉴 토글
  const menuBtn = document.getElementById('menuBtn');
  const mobileMenu = document.getElementById('mobileMenu');
  let menuOpen = false;
  menuBtn.addEventListener('click', () => {
    menuOpen = !menuOpen;
    if (menuOpen) {
      mobileMenu.style.maxHeight = mobileMenu.scrollHeight + 'px';
      mobileMenu.style.opacity = '1';
    } else {
      mobileMenu.style.maxHeight = '0px';
      mobileMenu.style.opacity = '0';
    }
  });
</script>
