  @keyframes pulseRingBlue { 0% { box-shadow: 0 0 0 0 rgba(74,125,255,0.55); } 70% { box-shadow: 0 0 0 20px rgba(74,125,255,0); } 100% { box-shadow: 0 0 0 0 rgba(74,125,255,0); } }

<section class="relative pt-[120px] md:pt-[136px] lg:pt-[150px] pb-20 md:pb-24 overflow-hidden">
  <div class="pointer-events-none absolute inset-0 z-0 hidden md:block">
    <svg class="absolute float-slow" style="left:6%; top:14%;" width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#4A7DFF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"><path d="M14.7 6.3a4 4 0 0 0-5.4 4.6L3 17.2V21h3.8l6.3-6.3a4 4 0 0 0 4.6-5.4l-2.6 2.6-2.1-2.1 2.7-2.7Z"/></svg>
    <svg class="absolute float-slower float-delay" style="left:37%; top:9%;" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#4A7DFF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 9.5V20h13V9.5"/></svg>
    <svg class="absolute float-slow" style="left:84%; top:12%;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4A7DFF" stroke-width="1.6" opacity="0.35"><circle cx="12" cy="12" r="8"/></svg>
    <span class="absolute rounded-full bg-cobalt" style="left:17%; top:14%; width:8px; height:8px; opacity:0.5;"></span>

          <span class="relative inline-block">내 근처<svg class="absolute left-0 -bottom-1 w-full h-3" viewBox="0 0 200 12" preserveAspectRatio="none"><path d="M2 8 Q 25 2, 50 8 T 100 8 T 150 8 T 198 8" fill="none" stroke="#FF7AAE" stroke-width="4" stroke-linecap="round"/></svg></span><br>
          <span class="inline-block bg-cobalt text-white px-3 md:px-4 rounded-lg">전문가가</span><br>직접 찾아옵니다.

<div id="requestModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
  <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden p-6 md:p-8 animate-fade-in relative">
    <button id="btnCloseModal" class="absolute top-4 right-4 text-ink/40 hover:text-ink text-2xl font-bold">&times;</button>
    
    <h3 id="modalTitle" class="text-2xl font-black text-ink tracking-tight">📋 맞춤 견적 요청하기</h3>
    <p class="text-sm text-ink/60 mt-1">3분 만에 작성하고 최고 기사님들의 견적을 받아보세요.</p>
    
    <form id="modalForm" class="mt-6 space-y-4">
      <div id="categoryGroup">
        <label class="block text-sm font-bold text-ink mb-1.5">필요한 대분야 선택</label>
        <select id="userCategory" class="w-full h-12 px-3 border-2 border-[#DCE9FF] rounded-xl focus:border-cobalt focus:outline-none text-sm font-medium">
          <option value="집수리">🔧 집수리 (수전, 전기, 하수구 등)</option>
          <option value="자동차">🚗 자동차 (덴트, 도색, 수리 등)</option>
          <option value="보험">🏆 보험 토너먼트 (익명 견적 비교)</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-bold text-ink mb-1.5">고객명 / 업체명</label>
        <input type="text" id="modalName" placeholder="이름을 입력해주세요" required class="w-full h-12 px-3 border-2 border-[#DCE9FF] rounded-xl focus:border-cobalt focus:outline-none text-sm">
      </div>

      <div>
        <label class="block text-sm font-bold text-ink mb-1.5">연락처</label>
        <input type="tel" id="modalPhone" placeholder="숫자만 입력해주세요 (- 제외)" required class="w-full h-12 px-3 border-2 border-[#DCE9FF] rounded-xl focus:border-cobalt focus:outline-none text-sm">
      </div>

      <div>
        <label class="block text-sm font-bold text-ink mb-1.5">상세 요청/소개 내용</label>
        <textarea id="modalDetails" rows="3" placeholder="예) 싱크대 수전 교체 비용 문의합니다 / 수리 경력 10년 정비소입니다" required class="w-full p-3 border-2 border-[#DCE9FF] rounded-xl focus:border-cobalt focus:outline-none text-sm resize-none"></textarea>
      </div>

      <button type="submit" class="w-full h-13 bg-cobalt text-white font-bold rounded-xl hover:bg-pinkAccent transition-colors duration-200 text-base shadow-lg">
        🚀 즉시 등록 신청하기
      </button>
    </form>
  </div>
</div>

<script>
  // 1. 수파베이스 설정 정보
  const SUPABASE_URL = 'https://jtoujsntxxqxsynsanxz.supabase.co'; 
  const SUPABASE_ANON_KEY = 'sb_publishable_BQmz1lOWrsYqkePwEZhiBg_mM8CARh6';

  // 2. 수파베이스 연결 초기화
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // 현재 열려있는 가입 형태 추적용 변수 ('client' 또는 'partner')
  let currentRole = 'client';

  // 3. 모달 제어 엘리먼트 정의
  const requestModal = document.getElementById('requestModal');
  const modalTitle = document.getElementById('modalTitle');
  const categoryGroup = document.getElementById('categoryGroup');
  const modalForm = document.getElementById('modalForm');

  // 모달 열기 함수 (고객용)
  function openClientModal() {
    currentRole = 'client';
    modalTitle.innerText = '📋 맞춤 견적 요청하기';
    categoryGroup.style.display = 'block'; // 분야 선택 보여주기
    requestModal.classList.remove('hidden');
  }

  // 모달 열기 함수 (파트너 기사님용)
  function openPartnerModal() {
    currentRole = 'partner';
    modalTitle.innerText = '🛠️ 기사님 파트너 등록 신청';
    categoryGroup.style.display = 'none'; // 파트너는 분야 선택 숨김
    requestModal.classList.remove('hidden');
  }

  // 모달 닫기 함수
  function closeModal() {
    requestModal.classList.add('hidden');
    modalForm.reset(); // 입력창 초기화
  }

  // 4. 모달창 이벤트 리스너 연결
  document.getElementById('btnCloseModal').addEventListener('click', closeModal);
  requestModal.addEventListener('click', (e) => { if(e.target === requestModal) closeModal(); });

  document.addEventListener('DOMContentLoaded', () => {
    // 사이트 전역의 '견적 받기' 및 '무료 시작하기' 버튼 연동
    document.querySelectorAll('.btn-open-modal').forEach(btn => {
      btn.addEventListener('click', (e) => { e.preventDefault(); openClientModal(); });
    });
    // 홈 화면의 '견적 받기' 링크 텍스트 버튼도 추가 연동
    document.querySelectorAll('a[href="#"]').forEach(btn => {
      if (btn.innerText.includes('견적 받기')) {
        btn.addEventListener('click', (e) => { e.preventDefault(); openClientModal(); });
      }
      if (btn.innerText.includes('파트너')) {
        btn.addEventListener('click', (e) => { e.preventDefault(); openPartnerModal(); });
      }
    });

    // 파트너 참여하기 전용 버튼 연동
    document.querySelectorAll('.btn-open-partner').forEach(btn => {
      btn.addEventListener('click', (e) => { e.preventDefault(); openPartnerModal(); });
    });

    // 5. 폼 전송 이벤트 처리 (수파베이스로 데이터 쏘기)
    modalForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const nameVal = document.getElementById('modalName').value;
      const phoneVal = document.getElementById('modalPhone').value;
      const detailsVal = document.getElementById('modalDetails').value;
      const categoryVal = currentRole === 'client' ? document.getElementById('userCategory').value : '전문가 파트너';

      // 수파베이스 테이블에 최종 인서트
      const { data, error } = await supabaseClient
        .from('users')
        .insert([
          { 
            name: nameVal, 
            phone: phoneVal, 
            role: currentRole, 
            category: categoryVal, 
            details: detailsVal 
          }
        ]);

      if (error) {
        alert('등록 중 에러가 발생했습니다: ' + error.message);
      } else {
        alert('🎉 신청이 완벽하게 접수되었습니다!\n감사합니다.');
        closeModal();
        // 화면 리프레시로 테이블 갱신 유도
        window.location.reload();
      }
    });
  });

  // 모바일 햄버거 토글 버튼 로직
  const menuBtn = document.getElementById('menuBtn');
  const mobileMenu = document.getElementById('mobileMenu');
  let menuOpen = false;
  menuBtn.addEventListener('click', () => {
    menuOpen = !menuOpen;
    if (menuOpen) {
      mobileMenu.style.maxHeight = mobileMenu.scrollHeight + 'px';
      mobileMenu.style.opacity = '1';
    } else {
      mobileMenu.style.maxHeight = '0px';
      mobileMenu.style.opacity = '0';
    }
  });
</script>
